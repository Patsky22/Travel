<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>关西出游 v0.15</title>
  <script>
    (() => {
      const param = new URLSearchParams(window.location.search).get("clawpilotTheme");
      const theme =
        param || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --cp-bg: #f7f4ef;
      --cp-bg-elevated: #fcfbf8;
      --cp-surface: #ffffff;
      --cp-surface-soft: #f5f5f5;
      --cp-border: #dedede;
      --cp-border-strong: #919191;
      --cp-text: #242424;
      --cp-text-muted: #5c5c5c;
      --cp-text-soft: #6f6f6f;
      --cp-accent: #b11f4b;
      --cp-accent-hover: #9a1a41;
      --cp-accent-soft: rgba(177, 31, 75, 0.08);
      --cp-accent-fg: #ffffff;
      --cp-success: #16a34a;
      --cp-danger: #dc2626;
      --cp-warning: #f59e0b;
      --cp-link: #0078d4;
      --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.12);
      --cp-overlay: rgba(255, 255, 255, 0.8);
      --cp-panel: rgba(255, 255, 255, 0.86);
      --cp-panel-strong: rgba(255, 255, 255, 0.96);
      --cp-sheen: rgba(255, 255, 255, 0.55);
      --cp-highlight: rgba(177, 31, 75, 0.12);
    }
    html[data-theme="dark"] {
      color-scheme: dark;
      --cp-bg: #3d3b3a;
      --cp-bg-elevated: #343231;
      --cp-surface: #292929;
      --cp-surface-soft: #2e2e2e;
      --cp-border: #474747;
      --cp-border-strong: #5f5f5f;
      --cp-text: #dedede;
      --cp-text-muted: #919191;
      --cp-text-soft: #b0b0b0;
      --cp-accent: #fd8ea1;
      --cp-accent-hover: #fb7b91;
      --cp-accent-soft: rgba(253, 142, 161, 0.14);
      --cp-accent-fg: #1a1a1a;
      --cp-success: #4ade80;
      --cp-danger: #f87171;
      --cp-warning: #fbbf24;
      --cp-link: #4da6ff;
      --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
      --cp-overlay: rgba(41, 41, 41, 0.88);
      --cp-panel: rgba(41, 41, 41, 0.72);
      --cp-panel-strong: rgba(41, 41, 41, 0.96);
      --cp-sheen: rgba(255, 255, 255, 0.04);
      --cp-highlight: rgba(253, 142, 161, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      margin: 0;
      background: var(--cp-bg);
      color: var(--cp-text);
      font-family: "Segoe UI", Aptos, Calibri, -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.55;
      overflow-x: hidden;
    }

    body.image-viewer-open {
      overflow: hidden;
    }

    a {
      color: var(--cp-link);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 18px 14px 48px;
    }

    .hero,
    .toolbar,
    .summary,
    .block-card {
      background: var(--cp-surface);
      border: 1px solid var(--cp-border);
      border-radius: 16px;
      box-shadow: 0 0 2px var(--cp-border), 0 1px 2px var(--cp-border);
    }

    .hero {
      padding: 22px;
      margin-bottom: 14px;
    }

    .eyebrow {
      color: var(--cp-accent);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 8px 0 10px;
      font-size: clamp(1.75rem, 5vw, 3rem);
      line-height: 1.08;
    }

    .version {
      color: var(--cp-accent);
      font-size: 0.56em;
      vertical-align: middle;
    }

    .subtitle {
      max-width: 860px;
      margin: 0 0 16px;
      color: var(--cp-text-muted);
      font-size: 1rem;
    }

    .chips,
    .block-tags,
    .actions,
    .jump-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip,
    .tag,
    .role,
    .difficulty {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 1px solid var(--cp-border);
      border-radius: 999px;
      background: var(--cp-accent-soft);
      color: var(--cp-text);
      padding: 6px 10px;
      font-size: 0.84rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .toolbar,
    .summary {
      padding: 12px;
      margin-bottom: 14px;
    }

    .control-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .field,
    .button,
    .status-select,
    .note-box {
      border: 1px solid var(--cp-border);
      border-radius: 0.625rem;
      background: var(--cp-surface);
      color: var(--cp-text);
      font: inherit;
    }

    .field,
    .status-select {
      min-height: 44px;
      padding: 0 12px;
    }

    .button {
      min-height: 42px;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 800;
    }

    .button.primary {
      background: var(--cp-accent);
      color: var(--cp-accent-fg);
      border-color: var(--cp-accent);
    }

    .button.secondary {
      background: var(--cp-surface-soft);
    }

    .summary-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .selected-output {
      color: var(--cp-text-muted);
      white-space: pre-wrap;
      font-size: 0.92rem;
    }

    .jump-list {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .jump-list a {
      border: 1px solid var(--cp-border);
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--cp-surface-soft);
      color: var(--cp-text);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .list {
      display: grid;
      gap: 16px;
    }

    .block-card {
      overflow: hidden;
    }

    .block-head {
      padding: 18px;
      background: linear-gradient(135deg, var(--cp-bg-elevated), var(--cp-surface));
      border-bottom: 1px solid var(--cp-border);
    }

    .block-title-line {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      align-items: start;
    }

    .block-index {
      color: var(--cp-accent);
      font-weight: 900;
      font-size: 0.9rem;
    }

    .block-head h2 {
      margin: 4px 0 8px;
      font-size: clamp(1.35rem, 4vw, 2rem);
      line-height: 1.2;
    }

    .block-summary {
      color: var(--cp-text-muted);
      margin: 0 0 12px;
    }

    .block-controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .block-body {
      padding: 14px;
      display: grid;
      gap: 14px;
    }

    .block-plan {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .info-box,
    .spot-info {
      border: 1px solid var(--cp-border);
      background: var(--cp-surface-soft);
      border-radius: 16px;
      padding: 12px;
    }

    .info-label,
    .spot-info strong {
      display: block;
      color: var(--cp-text-muted);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }

    .info-box p,
    .spot-info p {
      margin: 0;
    }

    .spot-list {
      display: grid;
      gap: 12px;
    }

    .spot-card {
      display: grid;
      grid-template-columns: 1fr;
      overflow: hidden;
      border: 1px solid var(--cp-border);
      border-radius: 16px;
      background: var(--cp-surface);
    }

    .spot-image {
      height: clamp(220px, 46vw, 340px);
      min-height: 210px;
      background: var(--cp-surface-soft);
      position: relative;
    }

    .spot-image img {
      width: 100%;
      height: 100%;
      min-height: 210px;
      object-fit: cover;
      display: block;
    }

    .image-fallback {
      min-height: 210px;
      display: grid;
      place-items: center;
      padding: 16px;
      color: var(--cp-text-muted);
      text-align: center;
      background: var(--cp-surface-soft);
    }

    .spot-content {
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .spot-top {
      display: grid;
      gap: 8px;
    }

    .spot-card h3 {
      margin: 0;
      font-size: 1.18rem;
    }

    .spot-meta {
      color: var(--cp-text-muted);
      font-size: 0.9rem;
    }

    .spot-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .mini-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .link-button {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 0 10px;
      border-radius: 0.625rem;
      border: 1px solid var(--cp-border);
      background: var(--cp-surface-soft);
      color: var(--cp-text);
      font-weight: 800;
      font-size: 0.9rem;
    }

    .link-button.map {
      background: var(--cp-accent);
      border-color: var(--cp-accent);
      color: var(--cp-accent-fg);
    }

    .note-box {
      min-height: 72px;
      width: 100%;
      padding: 10px 12px;
      resize: vertical;
    }

    .empty {
      padding: 18px;
      color: var(--cp-text-muted);
      text-align: center;
    }


    .jump-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .nav-block {
      border: 1px solid var(--cp-border);
      border-radius: 16px;
      background: var(--cp-surface-soft);
      overflow: hidden;
    }

    .nav-block summary {
      cursor: pointer;
      padding: 10px 12px;
      font-weight: 900;
      color: var(--cp-text);
    }

    .nav-spots {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 10px 10px;
    }

    .back-link,
    .mini-up {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 0 10px;
      border: 1px solid var(--cp-border);
      border-radius: 999px;
      background: var(--cp-surface-soft);
      color: var(--cp-text);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .back-link {
      margin: 0 0 10px;
    }

    .spot-title-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .spot-gallery {
      height: clamp(220px, 46vw, 340px);
      min-height: 230px;
      overflow: hidden;
      position: relative;
    }

    .gallery-track {
      height: 100%;
      min-height: 230px;
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
    }

    .gallery-track::-webkit-scrollbar {
      display: none;
    }

    .gallery-slide {
      flex: 0 0 100%;
      min-width: 100%;
      height: 100%;
      min-height: 230px;
      scroll-snap-align: start;
      background: var(--cp-surface-soft);
    }

    .gallery-slide img {
      width: 100%;
      height: 100%;
      min-height: 230px;
      object-fit: cover;
      display: block;
      cursor: zoom-in;
    }

    .gallery-count {
      position: absolute;
      top: 10px;
      right: 10px;
      border: 1px solid var(--cp-border);
      border-radius: 999px;
      background: var(--cp-panel-strong);
      color: var(--cp-text);
      padding: 4px 8px;
      font-size: 0.78rem;
      font-weight: 900;
    }

    .gallery-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border: 1px solid var(--cp-border);
      border-radius: 999px;
      background: var(--cp-panel-strong);
      color: var(--cp-text);
      cursor: pointer;
      font-weight: 900;
    }

    .gallery-nav.prev {
      left: 10px;
    }

    .gallery-nav.next {
      right: 10px;
    }

    .image-viewer {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
      padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
      background: var(--cp-overlay);
      color: var(--cp-text);
      backdrop-filter: blur(10px);
    }

    .image-viewer[hidden] {
      display: none;
    }

    .image-viewer-bar,
    .image-viewer-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border: 1px solid var(--cp-border);
      border-radius: 16px;
      background: var(--cp-panel-strong);
      padding: 8px;
      box-shadow: 0 0 2px var(--cp-border), 0 1px 2px var(--cp-border);
    }

    .image-viewer-title {
      font-size: 0.95rem;
      font-weight: 900;
    }

    .image-viewer-counter {
      color: var(--cp-text-muted);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .image-viewer-button {
      min-height: 40px;
      border: 1px solid var(--cp-border);
      border-radius: 0.625rem;
      background: var(--cp-surface);
      color: var(--cp-text);
      cursor: pointer;
      font: inherit;
      font-weight: 900;
      padding: 0 12px;
    }

    .image-viewer-button.primary {
      background: var(--cp-accent);
      border-color: var(--cp-accent);
      color: var(--cp-accent-fg);
    }

    .image-viewer-stage {
      min-height: 0;
      display: grid;
      place-items: center;
    }

    .image-viewer-stage img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 16px;
      background: var(--cp-surface-soft);
      box-shadow: 0 0 2px var(--cp-border), 0 1px 2px var(--cp-border);
    }

    .route-options {
      display: grid;
      gap: 12px;
    }

    .route-card {
      border: 1px solid var(--cp-border);
      border-radius: 16px;
      background: var(--cp-surface-soft);
      padding: 12px;
    }

    .route-card h3 {
      margin: 0 0 4px;
      font-size: 1rem;
    }

    .route-fit {
      margin: 0 0 10px;
      color: var(--cp-text-muted);
      font-size: 0.9rem;
    }

    .route-line {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      align-items: center;
      padding: 6px 0 10px;
      scrollbar-width: thin;
    }

    .route-node {
      flex: 0 0 auto;
      border: 1px solid var(--cp-border);
      border-radius: 999px;
      background: var(--cp-surface);
      color: var(--cp-text);
      padding: 6px 10px;
      font-size: 0.84rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .route-arrow {
      flex: 0 0 auto;
      color: var(--cp-accent);
      font-weight: 900;
    }

    .route-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .source {
      color: var(--cp-text-muted);
      font-size: 0.86rem;
      margin: 18px 4px 0;
    }

    @media (min-width: 760px) {
      .app {
        padding: 28px 22px 60px;
      }

      .jump-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .control-grid {
        grid-template-columns: 1.4fr 0.8fr 0.8fr;
      }

      .block-title-line {
        grid-template-columns: 1fr 240px;
      }

      .block-controls {
        grid-template-columns: 1fr;
      }

      .block-plan,
      .spot-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .spot-card {
        grid-template-columns: minmax(220px, 34%) 1fr;
      }

      .spot-image,
      .spot-gallery {
        height: auto;
      }

      .spot-image,
      .spot-image img,
      .image-fallback {
        min-height: 100%;
      }
    }

    @media (max-width: 480px) {
      .app {
        padding: 10px max(8px, env(safe-area-inset-left)) 36px max(8px, env(safe-area-inset-right));
      }

      body {
        font-size: 15px;
      }

      .hero,
      .block-head,
      .block-body,
      .spot-content {
        padding: 12px;
      }

      .subtitle {
        font-size: 0.92rem;
      }

      .chip,
      .tag,
      .role,
      .difficulty,
      .route-node {
        font-size: 0.78rem;
      }

      .spot-gallery,
      .gallery-track,
      .gallery-slide,
      .gallery-slide img,
      .spot-image,
      .spot-image img,
      .image-fallback {
        height: 220px;
        min-height: 0;
      }

      .route-card,
      .info-box,
      .spot-info {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="topNav" class="hero">
      <div class="eyebrow">Kansai block-based guide</div>
      <h1>关西出游 <span class="version">v0.15</span></h1>
      <p class="subtitle">
        按 10 个大板块重新整理，顶部导航可展开跳到每个小景点；每个小景点单独配 10 张图片，并保留看点、交通、停留、季节、票价和心得。
      </p>
      <div class="chips">
        <span class="chip">区域板块：<strong id="totalBlocks">10</strong></span>
        <span class="chip">小景点：<strong id="totalSpots">36</strong></span>
        <span class="chip">保留：<strong id="keepCount">0</strong></span>
        <span class="chip">版本：v0.15</span>
      </div>
      <nav id="jumpList" class="jump-list" aria-label="区域跳转"></nav>
    </section>

    <section class="toolbar" aria-label="筛选">
      <div class="control-grid">
        <input id="searchInput" class="field" type="search" placeholder="搜索区域、小景点、关键词..." />
        <select id="regionFilter" class="field" aria-label="按区域筛选">
          <option value="">全部区域</option>
        </select>
        <select id="statusFilter" class="field" aria-label="按筛选状态筛选">
          <option value="">全部状态</option>
          <option value="keep">保留</option>
          <option value="maybe">备选</option>
          <option value="drop">放弃</option>
          <option value="unset">未定</option>
        </select>
      </div>
    </section>

    <section class="summary">
      <div class="summary-actions">
        <button id="copyKeepButton" class="button primary" type="button">复制保留板块</button>
        <button id="copyAllButton" class="button secondary" type="button">复制全部板块</button>
        <button id="resetButton" class="button secondary" type="button">重置筛选</button>
      </div>
      <div id="selectedOutput" class="selected-output">还没有标记“保留”。</div>
    </section>

    <section id="list" class="list" aria-label="区域板块列表"></section>

    <p class="source">
      图片来自 Wikimedia Commons 等公开可引用图源；资料参考景点官网、官方旅游页面、JNTO/Japan Guide/地方观光网站。小红书图片未直接抓取，若你提供已授权或自己保存的图片，可再替换。
    </p>
  </main>

  <div id="imageViewer" class="image-viewer" role="dialog" aria-modal="true" aria-labelledby="imageViewerTitle" hidden>
    <div class="image-viewer-bar">
      <div>
        <div id="imageViewerTitle" class="image-viewer-title">图片预览</div>
        <div id="imageViewerCounter" class="image-viewer-counter">1 / 1</div>
      </div>
      <button id="imageViewerClose" class="image-viewer-button primary" type="button">关闭</button>
    </div>
    <div class="image-viewer-stage" aria-label="点击空白处关闭">
      <img id="imageViewerImage" alt="" />
    </div>
    <div class="image-viewer-footer">
      <button id="imageViewerPrev" class="image-viewer-button" type="button">‹ 上一张</button>
      <button id="imageViewerNext" class="image-viewer-button" type="button">下一张 ›</button>
    </div>
  </div>

  <script>
    const blocks = [
      {
            "id": "arashiyama",
            "region": "京都",
            "title": "岚山",
            "summary": "岚山作为一个完整大板块处理：寺院、竹林、渡月桥是核心，嵯峨野小火车作为外加项。",
            "time": "核心 4-6 小时；加嵯峨野小火车接近一日。",
            "budget": "基础散步低预算；寺院约 ¥500-1,000/处，小火车约 ¥880。",
            "route": "JR 嵯峨岚山 -> 天龙寺 -> 竹林 -> 常寂光寺 -> 渡月桥；外加项可插入嵯峨野小火车。",
            "note": "岚山最怕中午人潮，建议早到；小火车要单独查班次。",
            "difficulty": "中等：步行多，外加项需预约/班次",
            "spots": [

                              "https://upload.wikimedia.org/wikipedia/commons/4/4e/Saikachi-hamaoflandscape.jpg",
                              "https://upload.wikimedia.org/wikipedia/commons/thumb/8/84/Coca_Cola_and_the_Tree_%288459107861%29.jpg/1280px-Coca_Cola_and_the_Tree_%288459107861%29.jpg"

                  }
            ],
            "routeOptions": [
                  {
                        "name": "A 线：琵琶湖山谷主线",
                        "fit": "天气好时最值得，核心就是上山看湖。",

                              "京都站",
                              "JR 志贺站",

                              "琵琶湖露台",
                              "志贺站"
                        ],
                        "google": "https://www.google.com/maps/dir/?api=1&origin=Kyoto%20Station&destination=Biwako%20Valley&travelmode=transit&waypoints=Shiga%20Station"
                  },
                  {
                        "name": "B 线：夏季湖岸线",
                        "fit": "夏天或想看湖边时，在山谷后加近江舞子。",
                        "steps": [
                              "志贺站",
                              "琵琶湖山谷",
                              "近江舞子湖岸",
                              "京都"
                        ],
                        "google": "https://www.google.com/maps/dir/?api=1&origin=Shiga%20Station&destination=Omi%20Maiko%20Beach%20Lake%20Biwa&travelmode=transit&waypoints=Biwako%20Valley"

];

    const storageKey = "kansai-area-blocks-v0.15";
    const noteKey = "kansai-area-block-notes-v0.15";
    const spotById = new Map(blocks.flatMap((block) => block.spots.map((spot) => [spot.id, spot])));
    const statuses = new Map(Object.entries(JSON.parse(localStorage.getItem(storageKey) || "{}")));
    const notes = new Map(Object.entries(JSON.parse(localStorage.getItem(noteKey) || "{}")));

    const list = document.getElementById("list");
    const searchInput = document.getElementById("searchInput");
    const regionFilter = document.getElementById("regionFilter");
    const statusFilter = document.getElementById("statusFilter");
    const keepCount = document.getElementById("keepCount");
    const selectedOutput = document.getElementById("selectedOutput");
    const copyKeepButton = document.getElementById("copyKeepButton");
    const copyAllButton = document.getElementById("copyAllButton");
    const resetButton = document.getElementById("resetButton");
    const jumpList = document.getElementById("jumpList");
    const imageViewer = document.getElementById("imageViewer");
    const imageViewerImage = document.getElementById("imageViewerImage");
    const imageViewerTitle = document.getElementById("imageViewerTitle");
    const imageViewerCounter = document.getElementById("imageViewerCounter");
    const imageViewerClose = document.getElementById("imageViewerClose");
    const imageViewerPrev = document.getElementById("imageViewerPrev");
    const imageViewerNext = document.getElementById("imageViewerNext");
    let viewerImages = [];
    let viewerIndex = 0;

    function init() {
      document.getElementById("totalBlocks").textContent = blocks.length;
      document.getElementById("totalSpots").textContent = blocks.reduce((sum, block) => sum + block.spots.length, 0);

      [...new Set(blocks.map((block) => block.region))].sort().forEach((region) => {
        const option = document.createElement("option");
        option.value = region;
        option.textContent = region;
        regionFilter.appendChild(option);
      });

      jumpList.innerHTML = blocks.map((block) => `
        <details class="nav-block">
          <summary><a href="#${block.id}">${escapeHtml(shortTitle(block.title))}</a></summary>
          <div class="nav-spots">
            ${block.spots.map((spot) => `<a href="#${spot.id}">${escapeHtml(spot.name)}</a>`).join("")}
          </div>
        </details>
      `).join("");
      render();
    }

    function render() {
      const keyword = searchInput.value.trim().toLowerCase();
      const region = regionFilter.value;
      const status = statusFilter.value;
      const visible = blocks.filter((block) => {
        const current = statuses.get(block.id) || "unset";
        const spotText = block.spots.map((spot) => `${spot.name} ${spot.type} ${spot.highlights} ${spot.route}`).join(" ");
        const text = `${block.title} ${block.region} ${block.summary} ${block.route} ${block.note} ${spotText}`.toLowerCase();
        return (!keyword || text.includes(keyword)) &&
          (!region || block.region === region) &&
          (!status || current === status);
      });

      list.innerHTML = visible.length ? visible.map(blockHtml).join("") : '<div class="empty">没有匹配的区域板块。</div>';
      list.querySelectorAll(".status-select").forEach((select) => {
        select.addEventListener("change", () => setStatus(select.dataset.id, select.value));
      });
      list.querySelectorAll(".note-box").forEach((textarea) => {
        textarea.addEventListener("input", () => setNote(textarea.dataset.id, textarea.value));
      });
      list.querySelectorAll(".gallery-nav").forEach((button) => {
        button.addEventListener("click", () => scrollGallery(button.dataset.gallery, Number(button.dataset.direction)));
      });
      list.querySelectorAll("img[data-fallback]").forEach((img) => {
        img.addEventListener("error", () => showFallback(img));
      });
      list.querySelectorAll("img[data-viewer-spot]").forEach((img) => {
        img.addEventListener("click", () => openImageViewer(img.dataset.viewerSpot, Number(img.dataset.viewerIndex || 0)));
        img.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            openImageViewer(img.dataset.viewerSpot, Number(img.dataset.viewerIndex || 0));
          }
        });
      });
      renderSummary();
    }

    function blockHtml(block, index) {
      const current = statuses.get(block.id) || "unset";
      const note = notes.get(block.id) || "";
      return `
        <article id="${block.id}" class="block-card">
          <header class="block-head">
            <div class="block-title-line">
              <div>
                <div class="block-index">Block ${index + 1} · ${escapeHtml(block.region)}</div>
                <h2>${escapeHtml(block.title)}</h2>
                <a class="back-link" href="#topNav">↑ 回到导航</a>
                <p class="block-summary">${escapeHtml(block.summary)}</p>
                <div class="block-tags">
                  <span class="tag">${escapeHtml(block.time)}</span>
                  <span class="tag">${escapeHtml(block.difficulty)}</span>
                  <span class="tag">${block.spots.length} 个小景点</span>
                </div>
              </div>
              <div class="block-controls">
                <select class="status-select" data-id="${block.id}" aria-label="${escapeHtml(block.title)} 筛选状态">
                  <option value="unset" ${current === "unset" ? "selected" : ""}>未定</option>
                  <option value="keep" ${current === "keep" ? "selected" : ""}>保留</option>
                  <option value="maybe" ${current === "maybe" ? "selected" : ""}>备选</option>
                  <option value="drop" ${current === "drop" ? "selected" : ""}>放弃</option>
                </select>
                <span class="difficulty">${statusText(current)}</span>
              </div>
            </div>
          </header>
          <div class="block-body">
            <div class="block-plan">
              ${planBox("整合方式", block.route)}
              ${planBox("预算/票价", block.budget)}
              ${planBox("心得总结", block.note)}
              ${planBox("建议停留", block.time)}
            </div>
            ${routeOptionsHtml(block)}
            <div class="spot-list">
              ${block.spots.map(spotHtml).join("")}
            </div>
            <textarea class="note-box" data-id="${block.id}" placeholder="写这个区域板块的备注：想去顺序、是否保留、交通担心点...">${escapeHtml(note)}</textarea>
          </div>
        </article>
      `;
    }

    function spotHtml(spot) {
      return `
        <section id="${spot.id}" class="spot-card">
          ${galleryHtml(spot)}
          <div class="spot-content">
            <div class="spot-top">
              <div>
                <h3>${escapeHtml(spot.name)}</h3>
                <div class="spot-meta">${escapeHtml(spot.type)}</div>
              </div>
              <div class="spot-title-actions">
                <span class="role">${escapeHtml(spot.role)}</span>
                <a class="mini-up" href="#topNav">↑ 导航</a>
              </div>
            </div>
            <div class="spot-grid">
              ${spotInfo("核心看点", spot.highlights)}
              ${spotInfo("交通", spot.access)}
              ${spotInfo("建议停留", spot.time)}
              ${spotInfo("推荐季节", spot.season)}
              ${spotInfo("门票/费用", spot.fee)}
              ${spotInfo("注意事项", spot.caution)}
              ${spotInfo("适合路线", spot.route)}
            </div>
            <div class="mini-actions">
              <a class="link-button map" href="${spot.maps}" target="_blank" rel="noopener noreferrer">Google Maps</a>
              <a class="link-button" href="${spot.source}" target="_blank" rel="noopener noreferrer">资料源</a>
            </div>
          </div>
        </section>
      `;
    }

    function routeOptionsHtml(block) {
      if (!block.routeOptions || !block.routeOptions.length) {
        return "";
      }

      return `
        <section class="route-options" aria-label="${escapeHtml(block.title)} 路线选择">
          ${block.routeOptions.map((route) => `
            <article class="route-card">
              <h3>${escapeHtml(route.name)}</h3>
              <p class="route-fit">${escapeHtml(route.fit)}</p>
              <div class="route-line" aria-label="${escapeHtml(route.name)} 路线示意">
                ${route.steps.map((step, index) => `
                  ${index > 0 ? '<span class="route-arrow">→</span>' : ""}
                  <span class="route-node">${escapeHtml(step)}</span>
                `).join("")}
              </div>
              <div class="route-actions">
                <a class="link-button map" href="${route.google}" target="_blank" rel="noopener noreferrer">打开 Google Maps 路线</a>
                <a class="mini-up" href="#topNav">↑ 导航</a>
              </div>
            </article>
          `).join("")}
        </section>
      `;
    }

    function galleryHtml(spot) {
      const images = spot.images && spot.images.length ? spot.images : [spot.image];
      const galleryId = `gallery-${spot.id}`;
      return `
        <div class="spot-image spot-gallery">
          <div id="${galleryId}" class="gallery-track">
            ${images.map((image, index) => `
              <div class="gallery-slide">
                <img src="${image}" alt="${escapeHtml(spot.name)} ${index + 1}" loading="lazy" data-fallback="true" data-viewer-spot="${escapeHtml(spot.id)}" data-viewer-index="${index}" tabindex="0" role="button" aria-label="查看 ${escapeHtml(spot.name)} 第 ${index + 1} 张大图" />
              </div>
            `).join("")}
          </div>
          <span class="gallery-count">${images.length} 张</span>
          <button class="gallery-nav prev" type="button" data-gallery="${galleryId}" data-direction="-1" aria-label="上一张">‹</button>
          <button class="gallery-nav next" type="button" data-gallery="${galleryId}" data-direction="1" aria-label="下一张">›</button>
        </div>
      `;
    }

    function scrollGallery(galleryId, direction) {
      const track = document.getElementById(galleryId);
      if (!track) {
        return;
      }
      track.scrollBy({ left: direction * track.clientWidth, behavior: "smooth" });
    }

    function openImageViewer(spotId, index) {
      const spot = spotById.get(spotId);
      if (!spot) {
        return;
      }

      viewerImages = spot.images && spot.images.length ? spot.images : [spot.image];
      viewerIndex = Math.min(Math.max(index, 0), viewerImages.length - 1);
      imageViewerTitle.textContent = spot.name;
      imageViewer.hidden = false;
      document.body.classList.add("image-viewer-open");
      renderImageViewer();
      imageViewerClose.focus();
    }

    function renderImageViewer() {
      imageViewerImage.src = viewerImages[viewerIndex];
      imageViewerImage.alt = `${imageViewerTitle.textContent} ${viewerIndex + 1}`;
      imageViewerCounter.textContent = `${viewerIndex + 1} / ${viewerImages.length}`;
      const singleImage = viewerImages.length <= 1;
      imageViewerPrev.disabled = singleImage;
      imageViewerNext.disabled = singleImage;
    }

    function moveImageViewer(direction) {
      if (!viewerImages.length) {
        return;
      }

      viewerIndex = (viewerIndex + direction + viewerImages.length) % viewerImages.length;
      renderImageViewer();
    }

    function closeImageViewer() {
      if (imageViewer.hidden) {
        return;
      }

      imageViewer.hidden = true;
      imageViewerImage.removeAttribute("src");
      document.body.classList.remove("image-viewer-open");
    }

    function planBox(label, value) {
      return `<div class="info-box"><span class="info-label">${label}</span><p>${escapeHtml(value)}</p></div>`;
    }

    function spotInfo(label, value) {
      return `<div class="spot-info"><strong>${label}</strong><p>${escapeHtml(value)}</p></div>`;
    }

    function setStatus(id, value) {
      statuses.set(id, value);
      localStorage.setItem(storageKey, JSON.stringify(Object.fromEntries(statuses)));
      render();
    }

    function setNote(id, value) {
      notes.set(id, value);
      localStorage.setItem(noteKey, JSON.stringify(Object.fromEntries(notes)));
      renderSummary();
    }

    function renderSummary() {
      const kept = blocks.filter((block) => (statuses.get(block.id) || "unset") === "keep");
      keepCount.textContent = kept.length;
      selectedOutput.textContent = kept.length
        ? kept.map((block) => `保留：${block.title}\n小景点：${block.spots.map((spot) => spot.name).join("、")}\n备注：${notes.get(block.id) || "无"}`).join("\n\n")
        : "还没有标记“保留”。";
    }

    function copyBlocks(mode) {
      const target = mode === "keep"
        ? blocks.filter((block) => (statuses.get(block.id) || "unset") === "keep")
        : blocks;
      const text = target.map((block) => {
        const status = statusText(statuses.get(block.id) || "unset");
        return `${status}｜${block.title}\n小景点：${block.spots.map((spot) => `${spot.name}（${spot.role}）`).join("、")}\n建议：${block.route}\n预算：${block.budget}\n备注：${notes.get(block.id) || "无"}`;
      }).join("\n\n");
      navigator.clipboard.writeText(text || "无").then(() => {
        selectedOutput.textContent = text || "没有可复制内容。";
      });
    }

    function resetAll() {
      statuses.clear();
      notes.clear();
      localStorage.setItem(storageKey, "{}");
      localStorage.setItem(noteKey, "{}");
      render();
    }

    function statusText(status) {
      return {
        keep: "保留",
        maybe: "备选",
        drop: "放弃",
        unset: "未定"
      }[status] || "未定";
    }

    function shortTitle(title) {
      return title.split("：")[0].replace("板块", "");
    }

    function showFallback(img) {
      const fallback = document.createElement("div");
      fallback.className = "image-fallback";
      fallback.textContent = `${img.alt} 图片加载失败`;
      img.replaceWith(fallback);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    searchInput.addEventListener("input", render);
    regionFilter.addEventListener("change", render);
    statusFilter.addEventListener("change", render);
    copyKeepButton.addEventListener("click", () => copyBlocks("keep"));
    copyAllButton.addEventListener("click", () => copyBlocks("all"));
    resetButton.addEventListener("click", resetAll);
    imageViewerClose.addEventListener("click", closeImageViewer);
    imageViewerPrev.addEventListener("click", () => moveImageViewer(-1));
    imageViewerNext.addEventListener("click", () => moveImageViewer(1));
    imageViewer.addEventListener("click", (event) => {
      if (event.target === imageViewer || event.target.classList.contains("image-viewer-stage")) {
        closeImageViewer();
      }
    });
    document.addEventListener("keydown", (event) => {
      if (imageViewer.hidden) {
        return;
      }

      if (event.key === "Escape") {
        closeImageViewer();
      } else if (event.key === "ArrowLeft") {
        moveImageViewer(-1);
      } else if (event.key === "ArrowRight") {
        moveImageViewer(1);
      }
    });
    init();
  </script>
</body>
